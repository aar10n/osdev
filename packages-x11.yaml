# X11/Xorg library packages for graphical environment
# https://github.com/aar10n/makepkg/

packages:
  - name: xorgproto
    url: https://xorg.freedesktop.org/archive/individual/proto/xorgproto-2024.1.tar.xz
    files:
      - name: cross-file.txt
        content: |-
          [binaries]
          c = '${CC}'
          cpp = '${CXX}'
          ar = '${AR}'
          strip = '${STRIP}'
          pkgconfig = 'pkg-config'

          [host_machine]
          system = 'linux'
          cpu_family = '${PKGS_ARCH}'
          cpu = '${PKGS_ARCH}'
          endian = 'little'
    build: |
      meson setup build \
        --cross-file=cross-file.txt \
        --prefix=/usr \
        -Dlegacy=true
      meson compile -C build
    install: |
      meson install -C build --destdir=$SYS_ROOT

  - name: xcb-proto
    url: https://xorg.freedesktop.org/archive/individual/proto/xcb-proto-1.17.0.tar.xz
    env:
      - CFLAGS=-fPIC ${CFLAGS}
    build: |
      mkpkg::configure
      touch aclocal.m4 configure Makefile.in src/Makefile.in xcbgen/Makefile.in
      make
    install: |
      mkpkg::make_install

  - name: libXau
    url: https://xorg.freedesktop.org/archive/individual/lib/libXau-1.0.11.tar.xz
    env:
      - CFLAGS=-fPIC ${CFLAGS}
      - PKG_CONFIG_PATH=${PKG_CONFIG_PATH}:${SYS_ROOT}/usr/share/pkgconfig
    build: |
      mkpkg::configure --enable-static --disable-shared
      touch aclocal.m4 configure Makefile.in man/Makefile.in config.h.in
      make
    install: |
      mkpkg::make_install
      rm -f $SYS_ROOT/usr/lib/*.la
    depends_on:
      - xorgproto

  - name: libxcb
    url: https://xorg.freedesktop.org/archive/individual/lib/libxcb-1.17.0.tar.xz
    env:
      - CFLAGS=-fPIC ${CFLAGS}
      - PKG_CONFIG_PATH=${PKG_CONFIG_PATH}:${SYS_ROOT}/usr/share/pkgconfig
      - PYTHONPATH=${SYS_ROOT}/usr/lib/python3/dist-packages:${SYS_ROOT}/usr/share/xcb
    build: |
      mkpkg::configure --enable-static --disable-shared
      find . \( -name 'configure.ac' -o -name 'acinclude.m4' -o -name '*.am' -o -name '*.m4' \) -exec touch -t 202001010000 {} \;
      find . -name 'aclocal.m4' -exec touch -t 202001020000 {} \;
      find . -name 'configure' -type f -exec touch -t 202001030000 {} \;
      find . \( -name 'Makefile.in' -o -name 'config.h.in' \) -exec touch -t 202001040000 {} \;
      find . \( -name 'Makefile' -o -name 'config.h' \) -type f -exec touch {} \;
      make
    install: |
      mkpkg::make_install
      rm -f $SYS_ROOT/usr/lib/*.la
    depends_on:
      - xcb-proto
      - libXau

  - name: xtrans
    url: https://xorg.freedesktop.org/archive/individual/lib/xtrans-1.5.0.tar.xz
    env:
      - CFLAGS=-fPIC ${CFLAGS}
      - PKG_CONFIG_PATH=${PKG_CONFIG_PATH}:${SYS_ROOT}/usr/share/pkgconfig
    build: |
      mkpkg::configure
      touch aclocal.m4 configure Makefile.in
      make
    install: |
      mkpkg::make_install
    depends_on:
      - xorgproto

  - name: libX11
    url: https://xorg.freedesktop.org/archive/individual/lib/libX11-1.8.10.tar.xz
    env:
      - CFLAGS=-fPIC ${CFLAGS}
      - PKG_CONFIG_PATH=${PKG_CONFIG_PATH}:${SYS_ROOT}/usr/share/pkgconfig
      - XLOCALEDIR=/usr/share/X11/locale
      - xorg_cv_malloc0_returns_null=no
      - MALLOC_ZERO_RETURNS_NULL=no
    build: |
      mkpkg::configure \
        --enable-static --disable-shared \
        --disable-ipv6 --without-xmlto --without-fop \
        --with-keysymdefdir=$SYS_ROOT/usr/include/X11 \
        --disable-specs
      find . \( -name 'configure.ac' -o -name 'acinclude.m4' -o -name '*.am' -o -name '*.m4' \) -exec touch -t 202001010000 {} \;
      find . -name '*.in' -exec touch -t 202501010000 {} \;
      find . \( -name 'Makefile' -o -name 'config.h' -o -name 'config.status' \) -type f -exec touch {} \;
      make
    install: |
      mkpkg::make_install
      rm -f $SYS_ROOT/usr/lib/*.la
    depends_on:
      - xorgproto
      - libxcb
      - libXau
      - xtrans

  - name: libXext
    url: https://xorg.freedesktop.org/archive/individual/lib/libXext-1.3.6.tar.xz
    env:
      - CFLAGS=-fPIC ${CFLAGS}
      - PKG_CONFIG_PATH=${PKG_CONFIG_PATH}:${SYS_ROOT}/usr/share/pkgconfig
