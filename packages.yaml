  - name: ldns
    url: https://www.nlnetlabs.nl/downloads/ldns/ldns-1.8.4.tar.gz
    env:
      - CFLAGS=-fPIE ${CFLAGS}
      - LDFLAGS=-pie ${LDFLAGS}
    build: |
      mkpkg::configure \
        --enable-static --disable-shared \
        --with-drill \
        --with-ssl=${SYS_ROOT}/usr \
        --disable-dane-ta-usage \
        LIBS="-lssl -lcrypto -lbrotlienc -lbrotlidec -lbrotlicommon -lz"
      sed -i.bak 's/^LIBSSL_LIBS.*/LIBSSL_LIBS = -lssl -lcrypto -lbrotlienc -lbrotlidec -lbrotlicommon -lz/' Makefile
      make
    install: |
      mkpkg::make_install
    depends_on:
      - openssl
      - brotli
      - zlib
