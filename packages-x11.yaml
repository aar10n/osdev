  # native build of font-util to get host tools (ucs2any, bdftruncate)
  - name: font-util-native
    native: true
    url: https://xorg.freedesktop.org/archive/individual/font/font-util-1.4.1.tar.xz
    env:
      - CFLAGS=
      - CXXFLAGS=
      - CPPFLAGS=
      - LDFLAGS=
    build: |
      ./configure --prefix=/usr
      touch aclocal.m4 configure Makefile.in
      make
    install: |
      mkpkg::write_artifact bdftruncate
      mkpkg::write_artifact ucs2any

  - name: font-util
