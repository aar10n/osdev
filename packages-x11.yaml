  - name: xorg-server
    url: https://xorg.freedesktop.org/archive/individual/xserver/xorg-server-1.12.4.tar.bz2
    env:
      - CFLAGS=-fPIE -D_GNU_SOURCE ${CFLAGS}
      - LDFLAGS=-pie ${LDFLAGS}
      - PKG_CONFIG_PATH=${PKG_CONFIG_PATH}:${SYS_ROOT}/usr/share/pkgconfig
      - xorg_cv_malloc0_returns_null=no
      - ac_cv_file__dev_urandom=yes
      - LIBS=-lfreetype -lfontenc -lpng16 -lharfbuzz -lbrotlidec -lbrotlicommon -lz
    files:
      - name: hw/kdrive/linux/linux.c
        content: |-
          #ifdef HAVE_CONFIG_H
          #include <kdrive-config.h>
          #endif
          #include "kdrive.h"
          #include <errno.h>
          #include <signal.h>
          #include <sys/stat.h>
          #include <fcntl.h>

          #ifdef KDRIVE_EVDEV
          extern KdPointerDriver LinuxEvdevMouseDriver;
          extern KdKeyboardDriver LinuxEvdevKeyboardDriver;
          #endif

          int LinuxConsoleFd = -1;

          static int LinuxInit(void) {
              return 1;
          }

          static void LinuxEnable(void) {
          }

          static void LinuxDisable(void) {
          }

          static void LinuxFini(void) {
          }

          void KdOsAddInputDrivers(void) {
          #ifdef KDRIVE_EVDEV
              KdAddPointerDriver(&LinuxEvdevMouseDriver);
              KdAddKeyboardDriver(&LinuxEvdevKeyboardDriver);
          #endif
          }

          static void LinuxBell(int volume, int pitch, int duration) {
          }

          KdOsFuncs LinuxFuncs = {
              .Init = LinuxInit,
              .Enable = LinuxEnable,
              .Disable = LinuxDisable,
              .Fini = LinuxFini,
              .Bell = LinuxBell,
          };

          void OsVendorInit(void) {
              KdOsInit(&LinuxFuncs);
          }
    build: |
      curl -sL --connect-timeout 5 'https://git.savannah.gnu.org/cgit/config.git/plain/config.sub' > config.sub.new 2>/dev/null && mv config.sub.new config.sub || true
      curl -sL --connect-timeout 5 'https://git.savannah.gnu.org/cgit/config.git/plain/config.guess' > config.guess.new 2>/dev/null && mv config.guess.new config.guess || true
      grep -q 'linux-musl' config.sub || sed -i 's/linux-gnu\*/linux-gnu* | linux-musl*/g' config.sub

      # Fix KdGetOptions including '=' in key name
      sed -i 's/key = strndup(string, tam_key + 1)/key = strndup(string, tam_key)/' hw/kdrive/src/kinput.c

      mkpkg::configure \
        --enable-static --disable-shared \
        --disable-xorg \
        --disable-xvfb \
        --disable-xnest \
        --disable-xephyr \
        --disable-dmx \
        --disable-glx \
        --disable-dri \
        --disable-dri2 \
        --enable-kdrive \
        --enable-xfbdev \
        --enable-kdrive-evdev \
        --disable-config-udev \
        --disable-config-hal \
        --disable-secure-rpc \
        --disable-tcp-transport \
        --disable-ipv6 \
        --disable-composite \
        --with-fontrootdir=/usr/share/fonts/X11 \
        --with-xkb-path=/usr/share/X11/xkb \
        --with-xkb-output=/var/lib/xkb \
        --with-default-font-path=/usr/share/fonts/X11/misc
      find . \( -name 'configure.ac' -o -name 'acinclude.m4' -o -name '*.am' -o -name '*.m4' \) -exec touch -t 202001010000 {} \;
      find . -name '*.in' -exec touch -t 202501010000 {} \;
      find . \( -name 'Makefile' -o -name 'config.h' -o -name 'config.status' \) -type f -exec touch {} \;
      make
    install: |
      mkpkg::make_install
      rm -f $SYS_ROOT/usr/lib/*.la
    depends_on:
      - pixman
      - libXfont
      - libxkbfile
      - libX11
      - libXext
      - libxcb

